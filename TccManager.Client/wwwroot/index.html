<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TccManager.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/radzen-overrides.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TccManager.Client.styles.css" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!--
        Aplica o tema Radzen (Standard / Standard Dark) ANTES do WASM iniciar, para não haver
        flash do tema errado no primeiro paint. Lê a mesma chave de localStorage
        ("preferenciaTema") usada pelo TccManager.Client/Services/TemaService.cs. Usamos a
        variante "-base" dos temas porque o app convive com Bootstrap nas páginas ainda não
        migradas para Radzen (a variante "-base" não reseta elementos HTML globais).
    -->
    <script>
        (function () {
            var tema = 'standard-base';
            try {
                var valorSalvo = window.localStorage.getItem('preferenciaTema');
                if (valorSalvo && valorSalvo.replace(/"/g, '') === 'standard-dark') {
                    tema = 'standard-dark-base';
                }
            } catch (e) {
                // localStorage indisponível (ex.: navegação privada) — mantém o tema claro padrão.
            }

            var link = document.createElement('link');
            link.id = 'radzen-theme';
            link.rel = 'stylesheet';
            link.href = '_content/Radzen.Blazor/css/' + tema + '.css';
            document.head.appendChild(link);
        })();
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/downloadFile.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script src="js/theme.js"></script>
</body>

</html>
